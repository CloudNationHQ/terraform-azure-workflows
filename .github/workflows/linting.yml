name: "linting"

on:
  workflow_call:

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    name: pr commit
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'release-please[bot]' && github.actor != 'github-actions[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' && !contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            fix
            feat
            chore
          ignoreLabels: |
            autorelease
            dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-pr-title-skip:
    name: pr commit
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'release-please[bot]' || github.actor == 'github-actions[bot]' || github.event.pull_request.user.login == 'release-please[bot]' || github.event.pull_request.user.login == 'github-actions[bot]' || contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - run: echo "Skipped for release-please"

  run-tflint:
    name: linting
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'release-please[bot]' && github.actor != 'github-actions[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' && !contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        name: Setup TFLint
        with:
          tflint_version: v0.47.0

      - name: Run TFLint
        run: tflint

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      - name: terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: false

  run-tflint-skip:
    name: linting
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'release-please[bot]' || github.actor == 'github-actions[bot]' || github.event.pull_request.user.login == 'release-please[bot]' || github.event.pull_request.user.login == 'github-actions[bot]' || contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - run: echo "Skipped for release-please"

  tests:
    name: global tests
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'release-please[bot]' && github.actor != 'github-actions[bot]' && github.event.pull_request.user.login != 'release-please[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' && !contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - name: check out called repo
        uses: actions/checkout@v6
        with:
          repository: cloudnationhq/terraform-azure-workflows
          path: called

      - name: setup go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          cache-dependency-path: called/tests/go.sum

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: fetch go modules
        working-directory: called/tests
        run: go mod download

      - name: check out caller repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }} # should be able to handle forked PRs, because of the branch prefix
          ref: ${{ github.event.pull_request.head.sha }}
          path: caller
          fetch-depth: 0

      - name: run markdown tests
        working-directory: called/tests
        run: go test -v -run TestReadmeValidation markdown_test.go
        env:
          README_PATH: "${{ github.workspace }}/caller/README.md"

  tests-skip:
    name: global tests
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'release-please[bot]' || github.actor == 'github-actions[bot]' || github.event.pull_request.user.login == 'release-please[bot]' || github.event.pull_request.user.login == 'github-actions[bot]' || contains(github.event.pull_request.labels.*.name, 'autorelease') }}
    steps:
      - run: echo "Skipped for release-please"
