name: linting

on:
  workflow_call:

permissions:
  pull-requests: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json labels --jq '.labels[].name' | tr '\n' ' ')
          echo "Labels: $LABELS"
          [[ "$LABELS" == *"autorelease"* ]] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

  validate-pr-title:
    name: pr commit
    needs: check-release
    runs-on: ubuntu-latest
    steps:
      - if: needs.check-release.outputs.skip == 'true'
        run: echo "Skipped for release-please"
      - if: needs.check-release.outputs.skip != 'true'
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            fix
            feat
            chore
          ignoreLabels: |
            autorelease: pending
            autorelease: tagged
            dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run-tflint:
    name: linting
    needs: check-release
    runs-on: ubuntu-latest
    steps:
      - if: needs.check-release.outputs.skip == 'true'
        run: echo "Skipped for release-please"
      - if: needs.check-release.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.check-release.outputs.skip != 'true'
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.47.0
      - if: needs.check-release.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - if: needs.check-release.outputs.skip != 'true'
        run: |
          tflint
          terraform init
          terraform validate
          terraform fmt -check -recursive

  tests:
    name: global tests
    needs: check-release
    runs-on: ubuntu-latest
    steps:
      - if: needs.check-release.outputs.skip == 'true'
        run: echo "Skipped for release-please"
      - if: needs.check-release.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: cloudnationhq/terraform-azure-workflows
          path: called
      - if: needs.check-release.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          check-latest: true
          cache-dependency-path: called/tests/go.sum
      - if: needs.check-release.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - if: needs.check-release.outputs.skip != 'true'
        working-directory: called/tests
        run: go mod download
      - if: needs.check-release.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: caller
          fetch-depth: 0
      - if: needs.check-release.outputs.skip != 'true'
        working-directory: called/tests
        run: go test -v -run TestReadmeValidation markdown_test.go
        env:
          README_PATH: ${{ github.workspace }}/caller/README.md
