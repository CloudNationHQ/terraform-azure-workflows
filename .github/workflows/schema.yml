name: schema

on:
  workflow_call:
    inputs:
      exclude_resources:
        description: 'Comma-separated list of resource types to exclude'
        required: false
        type: string
        default: ''
      exclude_data_sources:
        description: 'Comma-separated list of data source types to exclude'
        required: false
        type: string
        default: ''
      parent_issue_ref:
        description: 'Parent issue reference to mention (e.g., terraform-azure-wam#53)'
        required: false
        type: string
        default: 'terraform-azure-wam#53'

permissions:
  contents: read
  issues: write

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6
        with:
          repository: cloudnationhq/terraform-azure-workflows
          path: called

      - name: setup go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          cache-dependency-path: called/tests/go.sum

      - name: fetch go modules
        working-directory: called/tests
        run: go mod download

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          path: caller
          fetch-depth: 0

      - name: Run schema tests
        working-directory: called/tests
        run: go test -v -run TestTerraformSchemaValidation -count=1 schema_test.go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TERRAFORM_ROOT: "${{ github.workspace }}/caller/"
          EXCLUDED_RESOURCES: ${{ inputs.exclude_resources }}
          EXCLUDED_DATA_SOURCES: ${{ inputs.exclude_data_sources }}

      - name: Comment parent link on matching issue
        if: inputs.parent_issue_ref != ''
        uses: actions/github-script@v7
        env:
          PARENT_ISSUE_REF: ${{ inputs.parent_issue_ref }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parentRef = process.env.PARENT_ISSUE_REF;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 20,
            });
            const match = issues.find(i => i.title.includes('Generated schema validation'));
            if (!match) {
              core.info('No open issue with title containing "Generated schema validation" found; skipping link.');
              return;
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: match.number,
              body: `Related parent: ${parentRef}`,
            });

