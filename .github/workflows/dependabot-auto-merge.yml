name: "dependabot auto merge"

on:
  workflow_call:
    inputs:
      merge-method:
        description: 'Merge method (squash, merge, rebase)'
        required: false
        default: squash
        type: string
      allow-majors:
        description: 'Auto-merge major version bumps'
        required: false
        default: false
        type: boolean
      timeout-minutes:
        description: 'Max minutes to wait for checks'
        required: false
        default: 10
        type: number
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Check if auto-merge allowed
        id: check
        run: |
          UPDATE_TYPE="${{ steps.meta.outputs.update-type }}"
          ALLOW_MAJORS="${{ inputs.allow-majors }}"

          if [[ "$ALLOW_MAJORS" == "true" ]] || [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]] || [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
            echo "Auto-merge allowed for $UPDATE_TYPE"
          else
            echo "allowed=false" >> $GITHUB_OUTPUT
            echo "Skipping major update: $UPDATE_TYPE"
          fi

      - name: Approve PR
        if: steps.check.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve

      - name: Wait for checks and merge
        if: steps.check.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          ELAPSED=0
          TIMEOUT=$((TIMEOUT_MINUTES * 60))

          echo "Waiting for checks (timeout: ${TIMEOUT_MINUTES}m)..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
            RESULT=$(gh pr checks $PR --repo $REPO --json name,state --jq '
              [.[] | select(.name | test("auto-merge") | not)] |
              {
                failed: [.[] | select(.state == "FAILURE" or .state == "ERROR")] | length,
                pending: [.[] | select(.state == "PENDING" or .state == "QUEUED" or .state == "IN_PROGRESS")] | length
              }
            ')

            FAILED=$(echo "$RESULT" | jq -r '.failed')
            PENDING=$(echo "$RESULT" | jq -r '.pending')

            if [ "$FAILED" -gt 0 ]; then
              echo "Checks failed"
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              echo "All checks passed, merging..."
              gh pr merge $PR --repo $REPO --${{ inputs.merge-method }} --admin
              exit 0
            fi

            echo "Waiting... ($PENDING pending, ${ELAPSED}s elapsed)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "Timeout waiting for checks"
          exit 1
