name: "dependabot auto merge"

on:
  workflow_call:
    inputs:
      merge-method:
        description: 'Merge method for auto-merge (squash, merge, rebase)'
        required: false
        default: squash
        type: string
      allow-majors:
        description: 'Auto-merge major version bumps when true'
        required: false
        default: false
        type: boolean
    secrets:
      github-token:
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}

      - name: Approve update
        if: ${{ inputs.allow-majors || contains(fromJson('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type) }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Enable auto-merge (native)
        if: ${{ inputs.allow-majors || contains(fromJson('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type) }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --${{ inputs.merge-method }} "$PR_URL"
