name: "dependabot auto merge"

on:
  workflow_call:
    inputs:
      merge-method:
        description: 'Merge method for auto-merge (squash, merge, rebase)'
        required: false
        default: squash
        type: string
      allow-majors:
        description: 'Auto-merge major version bumps when true'
        required: false
        default: false
        type: boolean
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Approve update
        if: ${{ inputs.allow-majors || contains(fromJson('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type) }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Wait for checks and merge
        if: ${{ inputs.allow-majors || contains(fromJson('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type) }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Waiting for status checks to pass..."
          # Wait for checks, excluding our own workflow
          while true; do
            # Get all check statuses except our own
            CHECKS=$(gh pr checks "$PR_URL" --json name,state --jq '.[] | select(.name != "dependabot-auto-merge / auto-merge" and .name != "auto-merge")')

            # Check if any are pending
            PENDING=$(echo "$CHECKS" | grep -c '"state":"PENDING"' || true)
            FAILED=$(echo "$CHECKS" | grep -c '"state":"FAILURE"' || true)

            if [ "$FAILED" -gt 0 ]; then
              echo "Some checks failed"
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              echo "All checks passed"
              break
            fi

            echo "Waiting for $PENDING checks..."
            sleep 10
          done

          echo "Merging..."
          gh pr merge --${{ inputs.merge-method }} "$PR_URL"
