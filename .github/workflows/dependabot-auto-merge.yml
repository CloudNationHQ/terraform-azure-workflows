name: dependabot auto merge

on:
  workflow_call:
    inputs:
      merge-method:
        description: 'Merge method (squash, merge, rebase)'
        required: false
        default: squash
        type: string
      allow-majors:
        description: 'Auto-merge major version bumps'
        required: false
        default: false
        type: boolean
      timeout-minutes:
        description: 'Max minutes to wait for checks'
        required: false
        default: 10
        type: number
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Approve, wait and merge
        if: inputs.allow-majors || contains(fromJSON('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TIMEOUT: ${{ inputs.timeout-minutes }}
          METHOD: ${{ inputs.merge-method }}
        run: |
          gh pr review $PR --repo $REPO --approve

          ELAPSED=0
          MAX=$((TIMEOUT * 60))
          echo "Waiting for checks (timeout: ${TIMEOUT}m)..."

          while [ $ELAPSED -lt $MAX ]; do
            RESULT=$(gh pr checks $PR --repo $REPO --json name,state --jq '
              [.[] | select(.name | test("auto-merge") | not)] |
              { failed: [.[] | select(.state == "FAILURE" or .state == "ERROR")] | length,
                pending: [.[] | select(.state == "PENDING" or .state == "QUEUED" or .state == "IN_PROGRESS")] | length }')

            FAILED=$(echo "$RESULT" | jq -r '.failed')
            PENDING=$(echo "$RESULT" | jq -r '.pending')

            [ "$FAILED" -gt 0 ] && echo "Checks failed" && exit 1
            [ "$PENDING" -eq 0 ] && echo "Merging..." && gh pr merge $PR --repo $REPO --$METHOD --admin && exit 0

            echo "Waiting... ($PENDING pending, ${ELAPSED}s)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "Timeout" && exit 1
